name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security-and-health:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Audit Python dependencies
        run: |
          python -m pip install --disable-pip-version-check pip-audit
          pip-audit -r requirements.txt

      - name: Run workspace and agent tests
        run: |
          python -m pip install --disable-pip-version-check -r requirements.txt
          python -m unittest discover -s tests -v

      - name: Build hardened image
        run: docker build -t taraqqub-shabaki:ci .

      - name: Start production container
        run: |
          docker run -d \
            --name taraqqub-ci \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --tmpfs /tmp \
            -p 127.0.0.1:8000:8000 \
            -e TARAQQUB_ENV=production \
            -e TARAQQUB_DB_PATH=/tmp/taraqqub.db \
            -e TARAQQUB_ADMIN_PASSWORD=CI-only-password-2026 \
            taraqqub-shabaki:ci

      - name: Verify health and non-root runtime
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8000/api/health; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              docker logs taraqqub-ci
              exit 1
            fi
            sleep 1
          done
          test "$(docker exec taraqqub-ci id -u)" = "10001"

      - name: Show container logs
        if: always()
        run: docker logs taraqqub-ci || true
