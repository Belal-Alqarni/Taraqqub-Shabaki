<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>إنشاء حساب · ترقّب شبكي | Taraqqub Shabaki</title>
    <link rel="stylesheet" href="/static/styles.css?v=10">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel signup-panel" aria-labelledby="signupTitle">
        <header class="auth-brand">
          <strong>
            <span>ترقّب شبكي</span>
            <span class="brand-divider">|</span>
            <span dir="ltr">Taraqqub Shabaki</span>
          </strong>
          <small>مساحة مستقلة وآمنة لشبكتك</small>
        </header>

        <div class="auth-heading">
          <span class="auth-kicker">ابدأ المراقبة</span>
          <h1 id="signupTitle">إنشاء حساب جديد</h1>
          <p>أنشئ مساحة عمل خاصة، ثم اربط Network Agent من داخل شبكتك.</p>
        </div>

        <form id="signupForm" class="login-form">
          <div class="form-field">
            <label for="workspaceName">اسم مساحة العمل</label>
            <input
              id="workspaceName"
              maxlength="80"
              autocomplete="organization"
              required
            >
          </div>
          <div class="form-field">
            <label for="username">اسم المستخدم</label>
            <input
              id="username"
              dir="ltr"
              maxlength="80"
              pattern="[A-Za-z0-9._-]+"
              autocomplete="username"
              required
            >
          </div>
          <div class="form-field">
            <label for="password">كلمة المرور</label>
            <input
              id="password"
              dir="ltr"
              type="password"
              minlength="12"
              maxlength="200"
              autocomplete="new-password"
              required
            >
            <small class="field-hint">12 حرفًا على الأقل.</small>
          </div>
          <div class="form-field">
            <label for="confirmPassword">تأكيد كلمة المرور</label>
            <input
              id="confirmPassword"
              dir="ltr"
              type="password"
              minlength="12"
              maxlength="200"
              autocomplete="new-password"
              required
            >
          </div>
          <button id="signupButton" type="submit">إنشاء الحساب</button>
        </form>
        <a class="signup-link" href="/login">لديك حساب؟ سجّل الدخول</a>
        <p id="signupError" class="form-error" role="alert"></p>
      </section>
    </main>
    <script src="/static/signup.js?v=3"></script>
  </body>
</html>
