<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>تسجيل الدخول · ترقّب شبكي | Taraqqub Shabaki</title>
    <link rel="stylesheet" href="/static/styles.css?v=10">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel" aria-labelledby="loginTitle">
        <header class="auth-brand">
          <strong>
            <span>ترقّب شبكي</span>
            <span class="brand-divider">|</span>
            <span dir="ltr">Taraqqub Shabaki</span>
          </strong>
          <small>منصة آمنة لمراقبة الشبكات</small>
        </header>

        <div class="auth-heading">
          <span class="auth-kicker">الوصول إلى مساحة العمل</span>
          <h1 id="loginTitle">تسجيل الدخول</h1>
          <p>تابع مراقبة أجهزتك وتنبيهات شبكتك من مكان واحد.</p>
        </div>

        <form id="loginForm" class="login-form">
          <div class="form-field">
            <label for="username">اسم المستخدم</label>
            <input
              id="username"
              name="username"
              dir="ltr"
              autocomplete="username"
              required
            >
          </div>
          <div class="form-field">
            <label for="password">كلمة المرور</label>
            <input
              id="password"
              name="password"
              dir="ltr"
              type="password"
              autocomplete="current-password"
              minlength="8"
              required
            >
          </div>
          <button id="loginButton" type="submit">تسجيل الدخول</button>
        </form>

        <div class="auth-options">
          <a id="signupLink" class="signup-link hidden" href="/signup">
            إنشاء حساب ومساحة عمل
          </a>
          <button
            id="demoButton"
            class="secondary-button demo-button hidden"
            type="button"
          >
            تجربة العرض العام
          </button>
        </div>
        <p id="loginError" class="form-error" role="alert"></p>
      </section>
    </main>
    <script src="/static/login.js?v=9"></script>
  </body>
</html>
