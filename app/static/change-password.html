<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>تغيير كلمة المرور · ترقّب شبكي | Taraqqub Shabaki</title>
    <link rel="stylesheet" href="/static/styles.css?v=9">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel" aria-labelledby="changeTitle">
        <header class="auth-brand">
          <strong>
            <span>ترقّب شبكي</span>
            <span class="brand-divider">|</span>
            <span dir="ltr">Taraqqub Shabaki</span>
          </strong>
          <small>حماية الحساب</small>
        </header>

        <div class="auth-heading">
          <span class="auth-kicker">خطوة أمنية مطلوبة</span>
          <h1 id="changeTitle">تعيين كلمة مرور جديدة</h1>
          <p>استبدل كلمة المرور المؤقتة قبل فتح مساحة العمل.</p>
        </div>

        <form id="changeForm" class="login-form">
          <div class="form-field">
            <label for="currentPassword">كلمة المرور المؤقتة</label>
            <input
              id="currentPassword"
              dir="ltr"
              type="password"
              autocomplete="current-password"
              minlength="8"
              required
            >
          </div>
          <div class="form-field">
            <label for="newPassword">كلمة المرور الجديدة</label>
            <input
              id="newPassword"
              dir="ltr"
              type="password"
              autocomplete="new-password"
              minlength="12"
              required
            >
          </div>
          <div class="form-field">
            <label for="confirmPassword">تأكيد كلمة المرور</label>
            <input
              id="confirmPassword"
              dir="ltr"
              type="password"
              autocomplete="new-password"
              minlength="12"
              required
            >
          </div>
          <button id="changeButton" type="submit">تحديث كلمة المرور</button>
        </form>
        <p id="changeError" class="form-error" role="alert"></p>
      </section>
    </main>
    <script src="/static/change-password.js?v=4"></script>
  </body>
</html>
