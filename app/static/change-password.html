<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Change password · ترقّب شبكي | Taraqqub Shabaki</title>
    <link rel="stylesheet" href="/static/styles.css?v=6">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel" aria-labelledby="changeTitle">
        <div class="brand">
          <div>
            <strong><span lang="ar" dir="rtl">ترقّب شبكي</span> | Taraqqub Shabaki</strong>
            <small>Account Security</small>
          </div>
        </div>
        <h1 id="changeTitle">Set a new password</h1>
        <p>Your temporary password must be replaced before continuing.</p>
        <form id="changeForm" class="login-form">
          <label for="currentPassword">Temporary password</label>
          <input
            id="currentPassword"
            type="password"
            autocomplete="current-password"
            minlength="8"
            required
          >
          <label for="newPassword">New password</label>
          <input
            id="newPassword"
            type="password"
            autocomplete="new-password"
            minlength="12"
            required
          >
          <label for="confirmPassword">Confirm new password</label>
          <input
            id="confirmPassword"
            type="password"
            autocomplete="new-password"
            minlength="12"
            required
          >
          <button id="changeButton" type="submit">Update password</button>
        </form>
        <p id="changeError" class="form-error" role="alert"></p>
      </section>
    </main>
    <script src="/static/change-password.js?v=4"></script>
  </body>
</html>
