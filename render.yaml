services:
  - type: web
    name: taraqqub-shabaki
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: TARAQQUB_ENV
        value: production
      - key: TARAQQUB_PUBLIC_DEMO
        value: "true"
      - key: TARAQQUB_ALLOW_SIGNUP
        value: "true"
      - key: TARAQQUB_DATABASE_URL
        fromDatabase:
          name: taraqqub-shabaki-db
          property: connectionString
      - key: TARAQQUB_SECURE_COOKIES
        value: "true"
      - key: TARAQQUB_MONITOR_INTERVAL
        value: "60"
      - key: TARAQQUB_ENABLE_SELF_HEALING
        value: "false"
      - key: TARAQQUB_ADMIN_USERNAME
        value: admin
      - key: TARAQQUB_ADMIN_PASSWORD
        generateValue: true
      - key: TARAQQUB_SESSION_HOURS
        value: "4"

databases:
  - name: taraqqub-shabaki-db
    plan: free
    databaseName: taraqqub
    user: taraqqub
